services:
  api:
    build:
      context: .
      target: api
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/data
    environment:
      - ConnectionStrings__Default=Data Source=/app/data/previsao.db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/produtos || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    volumes:
      - db-data:/app/data
    environment:
      - ConnectionStrings__Default=Data Source=/app/data/previsao.db
    depends_on:
      api:
        condition: service_healthy

volumes:
  db-data:
